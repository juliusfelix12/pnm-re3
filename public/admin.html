<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>RE3 – Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      background: linear-gradient(175deg, #a8d8f0 0%, #c8eaf8 40%, #e8f6ff 100%);
      display: flex; justify-content: center;
    }

    .app { width: 100%; max-width: 960px; min-height: 100vh; padding: 0 0 40px; }

    /* ── LOGIN ── */
    #screen-login {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px 20px;
    }
    #screen-login.hidden { display: none; }

    .login-card {
      width: 100%; max-width: 360px;
      background: white; border-radius: 20px;
      padding: 32px 28px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.10);
      text-align: center;
    }
    .login-card .logo { font-size: 36px; margin-bottom: 8px; }
    .login-card h2 { font-size: 20px; font-weight: 800; color: #1a3a6b; margin-bottom: 4px; }
    .login-card p { font-size: 13px; color: #999; margin-bottom: 24px; }
    .login-card input {
      width: 100%; padding: 12px 14px; border: 2px solid #e0e7ef;
      border-radius: 10px; font-size: 16px; outline: none;
      background: #f8fafc; font-family: inherit; margin-bottom: 12px;
      transition: border-color 0.2s;
    }
    .login-card input:focus { border-color: #1a3a6b; background: white; }
    .login-card button {
      width: 100%; padding: 13px; background: #1a3a6b; color: white;
      font-size: 15px; font-weight: 700; border: none; border-radius: 10px;
      cursor: pointer; letter-spacing: 0.5px;
    }
    .login-card button:active { background: #0f2447; }
    .error-msg {
      color: #dc2626; font-size: 13px; padding: 8px 12px;
      background: #fef2f2; border-radius: 8px; margin-bottom: 12px; display: none;
    }

    /* ── DASHBOARD ── */
    #screen-dashboard { display: none; }
    #screen-dashboard.active { display: block; }

    .dash-header {
      background: white; padding: 14px 20px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08); position: sticky; top: 0; z-index: 10;
    }
    .dash-header h1 { font-size: 16px; font-weight: 800; color: #1a3a6b; }
    .dash-header span { font-size: 12px; color: #888; }
    .btn-logout {
      background: none; border: 1px solid #e0e7ef; color: #666;
      padding: 6px 14px; border-radius: 8px; font-size: 13px; cursor: pointer;
    }

    /* Stats bar */
    .stats-bar {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 12px; padding: 16px 16px 0;
    }
    .stat-card {
      background: white; border-radius: 12px; padding: 14px 16px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.06); text-align: center;
    }
    .stat-card .val { font-size: 22px; font-weight: 900; color: #1a3a6b; }
    .stat-card .lbl { font-size: 11px; color: #888; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }

    /* Filter bar */
    .filter-bar {
      padding: 14px 16px 0;
      display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
    }
    .filter-bar select, .filter-bar input[type="text"] {
      padding: 8px 12px; border: 2px solid #e0e7ef; border-radius: 8px;
      font-size: 14px; background: white; outline: none; font-family: inherit;
      flex: 1; min-width: 160px;
    }
    .filter-bar select:focus, .filter-bar input:focus { border-color: #1a3a6b; }
    .filter-count { font-size: 13px; color: #888; white-space: nowrap; }

    /* Donation list */
    .donation-list {
      padding: 14px 16px; display: flex; flex-direction: column; gap: 10px;
    }

    .donation-card {
      background: white; border-radius: 12px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.07);
      overflow: hidden;
    }
    .donation-card-body {
      padding: 12px 16px;
      display: flex; align-items: flex-start; gap: 12px;
    }
    .branch-badge-sm {
      background: #1a3a6b; color: white;
      font-size: 10px; font-weight: 700; padding: 3px 8px;
      border-radius: 6px; white-space: nowrap; flex-shrink: 0;
      text-transform: uppercase; letter-spacing: 0.3px;
    }
    .donation-info { flex: 1; min-width: 0; }
    .donation-info .donor { font-size: 15px; font-weight: 700; color: #1a3a6b; }
    .donation-info .meta { font-size: 12px; color: #999; margin-top: 3px; }
    .donation-kg {
      font-size: 18px; font-weight: 900; color: #1a3a6b; white-space: nowrap;
    }
    .donation-kg span { font-size: 11px; font-weight: 500; color: #888; }

    .donation-photo {
      width: 100%; max-height: 260px; object-fit: cover;
      cursor: pointer; display: block;
      border-top: 1px solid #f0f4f8;
    }

    .empty-state {
      text-align: center; padding: 60px 20px; color: #aaa;
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }

    /* Photo lightbox */
    .lightbox {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.85); z-index: 100;
      align-items: center; justify-content: center;
      padding: 20px;
    }
    .lightbox.active { display: flex; }
    .lightbox img { max-width: 100%; max-height: 90vh; border-radius: 8px; object-fit: contain; }
    .lightbox-close {
      position: absolute; top: 16px; right: 16px;
      background: rgba(255,255,255,0.15); border: none; color: white;
      width: 36px; height: 36px; border-radius: 50%; font-size: 18px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
  </style>
</head>
<body>
<div class="app">

  <!-- LOGIN -->
  <div id="screen-login">
    <div class="login-card">
      <div class="logo">🔐</div>
      <h2>Admin Dashboard</h2>
      <p>RE3 – PNM Donation Tracker</p>
      <div class="error-msg" id="login-error"></div>
      <input type="password" id="input-password" placeholder="Masukkan password admin"
             autocomplete="current-password">
      <button onclick="doLogin()">Masuk</button>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="screen-dashboard">
    <div class="dash-header">
      <div>
        <h1>Admin Dashboard</h1>
        <span>RE3 – PNM Donation Tracker</span>
      </div>
      <button class="btn-logout" onclick="doLogout()">Keluar</button>
    </div>

    <div class="stats-bar">
      <div class="stat-card">
        <div class="val" id="stat-total-kg">—</div>
        <div class="lbl">Total KG</div>
      </div>
      <div class="stat-card">
        <div class="val" id="stat-total-entries">—</div>
        <div class="lbl">Donasi</div>
      </div>
      <div class="stat-card">
        <div class="val" id="stat-active-branches">—</div>
        <div class="lbl">Cabang Aktif</div>
      </div>
    </div>

    <div class="filter-bar">
      <select id="filter-branch" onchange="applyFilter()">
        <option value="">Semua Cabang</option>
      </select>
      <input type="text" id="filter-name" placeholder="Cari nama penyumbang…" oninput="applyFilter()">
      <span class="filter-count" id="filter-count"></span>
    </div>

    <div class="donation-list" id="donation-list"></div>
  </div>

</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="">
</div>

<script>
  let allDonations = [];

  document.getElementById('input-password').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  async function doLogin() {
    const password = document.getElementById('input-password').value;
    const errEl = document.getElementById('login-error');
    errEl.style.display = 'none';
    try {
      const res = await fetch('/api/admin/login', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      showDashboard();
    } catch (err) {
      errEl.textContent = err.message;
      errEl.style.display = 'block';
    }
  }

  async function doLogout() {
    await fetch('/api/admin/logout', { method: 'POST' });
    location.reload();
  }

  async function showDashboard() {
    document.getElementById('screen-login').classList.add('hidden');
    document.getElementById('screen-dashboard').classList.add('active');
    await loadData();
  }

  async function loadData() {
    try {
      const res = await fetch('/api/admin/donations');
      if (res.status === 401) { location.reload(); return; }
      const data = await res.json();
      allDonations = data.donations;

      document.getElementById('stat-total-kg').textContent = data.total + ' kg';
      document.getElementById('stat-total-entries').textContent = data.donations.length;
      const activeBranches = new Set(data.donations.map(d => d.branch_id)).size;
      document.getElementById('stat-active-branches').textContent = activeBranches + ' / ' + data.branches.length;

      const sel = document.getElementById('filter-branch');
      data.branches.forEach(b => {
        const opt = document.createElement('option');
        opt.value = b.id; opt.textContent = b.name;
        sel.appendChild(opt);
      });

      applyFilter();
    } catch {
      document.getElementById('donation-list').innerHTML =
        '<div class="empty-state"><div class="icon">⚠️</div><p>Gagal memuat data.</p></div>';
    }
  }

  function applyFilter() {
    const branchId = parseInt(document.getElementById('filter-branch').value) || null;
    const nameQ = document.getElementById('filter-name').value.toLowerCase().trim();

    let filtered = allDonations;
    if (branchId) filtered = filtered.filter(d => d.branch_id === branchId);
    if (nameQ) filtered = filtered.filter(d => d.donor_name.toLowerCase().includes(nameQ));

    document.getElementById('filter-count').textContent =
      filtered.length + ' data' + (filtered.length !== allDonations.length ? ' (difilter)' : '');

    renderList(filtered);
  }

  function renderList(donations) {
    const el = document.getElementById('donation-list');
    if (!donations.length) {
      el.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>Tidak ada data.</p></div>';
      return;
    }
    el.innerHTML = donations.map(d => `
      <div class="donation-card">
        <div class="donation-card-body">
          <span class="branch-badge-sm">${esc(d.branch_name)}</span>
          <div class="donation-info">
            <div class="donor">${esc(d.donor_name)}</div>
            <div class="meta">${d.donation_date || '—'} · Diinput ${d.submitted_at_fmt} WIB</div>
          </div>
          <div class="donation-kg">${d.kg} <span>kg</span></div>
        </div>
        ${d.photo ? `<img class="donation-photo" src="${d.photo}" loading="lazy"
          onclick="openLightbox('${d.photo}')"
          onerror="this.style.display='none'">` : ''}
      </div>
    `).join('');
  }

  function openLightbox(src) {
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox').classList.add('active');
  }
  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('active');
    document.getElementById('lightbox-img').src = '';
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Auto-check session on load
  (async () => {
    try {
      const res = await fetch('/api/admin/donations');
      if (res.ok) showDashboard();
    } catch {}
  })();
</script>
</body>
</html>
