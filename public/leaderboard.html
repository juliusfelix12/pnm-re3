<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RE3 – Leaderboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(160deg, #7ec8e3 0%, #a8d9f0 25%, #c8eaf8 55%, #dff3ff 100%);
      min-height: 100vh;
      position: relative;
    }

    .cloud { position: fixed; border-radius: 50%; background: rgba(255,255,255,0.45); filter: blur(70px); pointer-events: none; z-index: 0; }
    .cloud-1 { width: 600px; height: 280px; top: -100px; left: -80px; }
    .cloud-2 { width: 450px; height: 200px; top: 40px; right: -60px; }
    .cloud-3 { width: 360px; height: 160px; bottom: 60px; left: 30%; }

    .page {
      position: relative; z-index: 1;
      width: 100%;
      display: flex; flex-direction: column;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .header {
      background: transparent;
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 24px 8px;
      flex-shrink: 0;
    }

    .header-logo { display: flex; align-items: center; flex: 1; }
    .header-logo.right { justify-content: flex-end; }
    .header-logo img {
      height: clamp(48px, 10vw, 80px);
      width: auto; object-fit: contain;
      max-width: clamp(120px, 18vw, 200px);
    }

    .header-center {
      display: flex; align-items: center; justify-content: center;
      flex: 1;
    }
    .header-center img {
      height: clamp(80px, 16vw, 200px);
      width: auto; object-fit: contain;
      transform: scale(2);
    }

    /* ── TITLE BLOCK ── */
    .title-block {
      padding: 4px 24px 10px;
      flex-shrink: 0;
    }
    .title-block h1 {
      font-size: clamp(15px, 3.5vw, 32px);
      font-weight: 900; color: #1a3a6b; line-height: 1.2;
    }
    .title-block .subtitle {
      font-size: clamp(12px, 2.2vw, 18px);
      color: #5a7a9a; margin-top: 3px;
    }
    .title-block .update-time {
      font-size: clamp(11px, 1.8vw, 15px);
      color: #8aabc8; margin-top: 3px;
    }
    .live-badge {
      display: inline-flex; align-items: center; gap: 7px;
      margin-top: 6px;
      font-size: clamp(11px, 1.6vw, 14px); font-weight: 700;
      color: #dc2626; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .live-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #dc2626; flex-shrink: 0;
      animation: liveblink 1.4s ease-in-out infinite;
    }
    @keyframes liveblink {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.15; transform: scale(0.7); }
    }

    /* ── BODY ── */
    .body {
      display: flex; flex-direction: column;
      padding: 0 16px 20px; gap: 14px;
      flex: 1;
    }

    /* ── PODIUM ── */
    .podium-wrap {
      display: flex; justify-content: center; align-items: flex-end;
      gap: clamp(8px, 2vw, 24px);
      padding: 0 clamp(4px, 4vw, 40px);
      height: clamp(130px, 28vw, 220px);
    }

    .podium-slot { display: flex; flex-direction: column; align-items: center; }
    .podium-slot.rank-1 { flex: 0 0 38%; }
    .podium-slot.rank-2 { flex: 0 0 28%; }
    .podium-slot.rank-3 { flex: 0 0 28%; }

    .podium-card {
      width: 100%; border-radius: 16px 16px 0 0;
      padding: clamp(10px, 2vw, 18px) clamp(10px, 2vw, 20px);
      background: linear-gradient(145deg, #1a52a8 0%, #2563eb 60%, #3b82f6 100%);
      display: flex; align-items: center; gap: clamp(8px, 2vw, 16px);
      box-shadow: 0 -6px 24px rgba(30,70,170,0.30);
      position: relative; overflow: hidden;
    }
    .podium-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
    }
    .podium-slot.rank-1 .podium-card { height: clamp(90px, 22vw, 180px); }
    .podium-slot.rank-2 .podium-card { height: clamp(72px, 17vw, 138px); }
    .podium-slot.rank-3 .podium-card { height: clamp(60px, 15vw, 120px); }

    .podium-slot.rank-1 .podium-card::before { background: linear-gradient(90deg, #f5c842, #fde68a, #f5c842); }
    .podium-slot.rank-2 .podium-card::before { background: linear-gradient(90deg, #9bb8d4, #cbd5e1, #9bb8d4); }
    .podium-slot.rank-3 .podium-card::before { background: linear-gradient(90deg, #c87941, #d97706, #c87941); }

    .podium-medal-wrap {
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: clamp(28px, 7vw, 64px);
      width: clamp(36px, 8vw, 72px);
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
    }

    .podium-info { flex: 1; min-width: 0; }
    .podium-name {
      font-size: clamp(8px, 2vw, 16px);
      font-weight: 800; color: white;
      text-transform: uppercase; letter-spacing: 0.5px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      opacity: 0.9;
    }
    .podium-slot.rank-1 .podium-name { font-size: clamp(10px, 2.4vw, 20px); opacity: 1; }
    .podium-kg-row { display: flex; align-items: baseline; gap: 4px; margin-top: 4px; }
    .podium-kg {
      font-size: clamp(16px, 5vw, 44px);
      font-weight: 900; color: white; line-height: 1;
    }
    .podium-slot.rank-1 .podium-kg { font-size: clamp(20px, 6vw, 52px); }
    .podium-kg-unit { font-size: clamp(9px, 1.8vw, 16px); color: rgba(255,255,255,0.65); font-weight: 600; }

    .podium-base { width: 100%; height: 10px; border-radius: 0 0 6px 6px; }
    .podium-slot.rank-1 .podium-base { background: #1240a0; }
    .podium-slot.rank-2 .podium-base { background: #1240a0; }
    .podium-slot.rank-3 .podium-base { background: #1240a0; }

    .podium-empty {
      width: 100%; border-radius: 16px 16px 0 0;
      background: rgba(255,255,255,0.20);
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.5); font-size: 13px;
    }

    /* ── RANK TABLE – mobile: single column ── */
    .rank-table-wrap {
      display: flex; flex-direction: column; gap: 6px;
    }

    .rank-row {
      background: rgba(255,255,255,0.70);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border-radius: 10px;
      padding: 9px 14px;
      display: flex; align-items: center; gap: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }
    .rank-num {
      width: 30px; height: 30px; flex-shrink: 0;
      background: rgba(30,70,170,0.12); border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 800; color: #1a52a8;
    }
    .rank-name {
      flex: 1; font-size: clamp(12px, 3vw, 14px);
      font-weight: 700; color: #1a3a6b;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .rank-kg {
      font-size: clamp(13px, 3.2vw, 15px);
      font-weight: 800; color: #1a52a8; white-space: nowrap;
    }
    .rank-kg span { font-size: 10px; font-weight: 500; color: #7a9ab8; }

    /* ── TV / DESKTOP (≥ 900px): no scroll, everything fits ── */
    @media (min-width: 900px) {
      body { height: 100vh; overflow: hidden; }
      .page { height: 100vh; overflow: hidden; }

      /* Compact header — logos moderate size like vendor */
      .header { padding: 10px 40px 6px; }
      .header-logo img { height: 52px; max-width: 160px; }
      .header-center img { height: 72px; transform: scale(2); }

      .title-block { padding: 2px 40px 6px; }
      .title-block h1 { font-size: clamp(16px, 1.6vw, 26px); }
      .title-block .subtitle { font-size: 15px; margin-top: 2px; }
      .title-block .update-time { font-size: 13px; margin-top: 2px; }
      .live-badge { font-size: 13px; margin-top: 5px; }
      .live-dot { width: 9px; height: 9px; }

      .body { flex: 1; min-height: 0; padding: 0 40px 12px; gap: 10px; overflow: hidden; }

      .podium-wrap {
        flex-shrink: 0;
        height: clamp(140px, 20vh, 220px);
        padding: 0 60px;
        gap: 16px;
      }
      .podium-slot.rank-1 .podium-card { height: clamp(88px, 13.5vh, 162px); }
      .podium-slot.rank-2 .podium-card { height: clamp(70px, 10.5vh, 126px); }
      .podium-slot.rank-3 .podium-card { height: clamp(58px, 9vh, 108px); }

      /* Rank table fills remaining space, NO scroll on TV */
      .rank-table-wrap {
        flex: 1; min-height: 0;
        display: grid;
        grid-template-rows: repeat(14, 1fr);
        grid-auto-flow: column;
        grid-auto-columns: 1fr;
        gap: 5px;
        overflow: hidden;
      }

      .rank-row { padding: 0 12px; border-radius: 8px; }
      .rank-num { width: 26px; height: 26px; font-size: 11px; border-radius: 6px; }
      .rank-name { font-size: clamp(10px, 0.85vw, 13px); }
      .rank-kg { font-size: clamp(11px, 0.9vw, 14px); }
    }
  </style>
</head>
<body>
  <div class="cloud cloud-1"></div>
  <div class="cloud cloud-2"></div>
  <div class="cloud cloud-3"></div>

  <div class="page">
    <div class="header">
      <div class="header-logo">
        <img src="assets/danantara_final.png" alt="Danantara Indonesia">
      </div>
      <div class="header-center">
        <img src="assets/revised-removebg-preview.png" alt="RE3">
      </div>
      <div class="header-logo right">
        <img src="assets/PNM_logo.svg.png" alt="PNM">
      </div>
    </div>

    <div class="title-block">
      <h1>Data Urutan Penyumbang Sementara</h1>
      <div class="subtitle">Berdasarkan berat barang (Kg)</div>
      <div class="update-time" id="update-time">Terakhir update pada —</div>
      <div class="live-badge"><span class="live-dot"></span>Live</div>
    </div>

    <div class="body">
      <div class="podium-wrap" id="podium"></div>
      <div class="rank-table-wrap" id="rank-table"></div>
    </div>
  </div>

<script>
  const MEDALS = ['🥇','🥈','🥉'];

  function renderPodium(top3) {
    const el = document.getElementById('podium');
    const slots = [
      { data: top3[1], cls: 'rank-2', medal: MEDALS[1] },
      { data: top3[0], cls: 'rank-1', medal: MEDALS[0] },
      { data: top3[2], cls: 'rank-3', medal: MEDALS[2] },
    ];
    el.innerHTML = slots.map(({ data, cls, medal }) => {
      if (!data) return `<div class="podium-slot ${cls}"><div class="podium-empty podium-card">—</div><div class="podium-base"></div></div>`;
      return `
        <div class="podium-slot ${cls}">
          <div class="podium-card">
            <div class="podium-medal-wrap">${medal}</div>
            <div class="podium-info">
              <div class="podium-name">${esc(data.name)}</div>
              <div class="podium-kg-row">
                <span class="podium-kg">${data.total_kg}</span>
                <span class="podium-kg-unit">KG</span>
              </div>
            </div>
          </div>
          <div class="podium-base"></div>
        </div>`;
    }).join('');
  }

  function renderTable(rest) {
    const el = document.getElementById('rank-table');
    if (!rest.length) { el.innerHTML = ''; return; }
    el.innerHTML = rest.map((item, i) => `
      <div class="rank-row">
        <div class="rank-num">${i + 4}</div>
        <div class="rank-name" title="${esc(item.name)}">${esc(item.name)}</div>
        <div class="rank-kg">${item.total_kg} <span>kg</span></div>
      </div>
    `).join('');
  }

  function formatDatetime(d) {
    const pad = n => String(n).padStart(2,'0');
    return `${pad(d.getDate())}-${pad(d.getMonth()+1)}-${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  }

  async function refresh() {
    try {
      const res = await fetch('/api/leaderboard');
      const data = await res.json();
      renderPodium(data.slice(0, 3));
      renderTable(data.slice(3));
      document.getElementById('update-time').textContent = 'Terakhir update pada ' + formatDatetime(new Date());
    } catch (e) {
      console.error('Gagal refresh leaderboard:', e);
    }
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  refresh();
  setInterval(refresh, 5000);
</script>
</body>
</html>
